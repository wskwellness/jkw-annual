# ─────────────────────────────────────────────────────────────
# JKW Full Volume — Configuration File
# Copy this file to your year folder as: YYYY/volume_config.yaml
# Then fill in each field for the new volume.
# ─────────────────────────────────────────────────────────────

# ── Volume metadata ──────────────────────────────────────────
year: 2023
volume: 12        # e.g., Vol 12
issue: 1          # e.g., No 1

# ── Cover image ──────────────────────────────────────────────
# Path is relative to the year folder (e.g., 2023/)
cover_image: cover-2023.png   # .pdf or .png (both work)

# ── Output ───────────────────────────────────────────────────
# Name of the final merged PDF (saved inside the year folder)
output_file: JKW_2023_Full_Volume.pdf

# ── Articles ─────────────────────────────────────────────────
# List articles in the order they should appear in the PDF.
# Tip: prefix the PDF files with numbers (01_, 02_, …) so the
# order is visible in the folder, then list them here in that order.
# file is relative to the year folder.

articles:
  - file: sources/manuscripts/01_acute_beetroot_supplementation.pdf
    title: "Acute Beetroot Supplementation May Improve Blood Pressure But Not Exercise Economy in Female Masters Swimmers"
    page_start: 1

  - file: sources/manuscripts/02_acute_effects_sets_volume.pdf
    title: "Acute Effects of Different Number of Sets and Non-Equalized Volume on Muscle Thickness, Peak Force, and Physical Performance in Recreationally-Trained Participants"
    page_start: 10

  - file: sources/manuscripts/03_adult_outdoor_play_preferences.pdf
    title: "Adult Outdoor Play Preferences: Why Nature Space Design Matters"
    page_start: 20

  - file: sources/manuscripts/04_bmi_sex_fundamental_movement.pdf
    title: "Examining the Relationship Between BMI, Sex, and Fundamental Movement Skill Performance in Low-Income Rural Children"
    page_start: 30

  - file: sources/manuscripts/05_hr_variability_covid19.pdf
    title: "Daily Heart Rate Variability is Higher in Regular Exercisers Versus Matched Non-Exercisers with Similar Chronic Stressor Profiles During the COVID-19 Pandemic"
    page_start: 38

  - file: sources/manuscripts/06_positive_negative_self_talk.pdf
    title: "Effects of Positive and Negative Self-Talk on Balance and Postural Sway in College Students"
    page_start: 45

  - file: sources/manuscripts/07_weight_bias_fitness_industry.pdf
    title: "Explicit Weight Bias Concerns in the Fitness Industry: A Quantitative Analysis"
    page_start: 57


# ── WSKW Chronicles ──────────────────────────────────────────
# Provide the Chronicles as a pre-built PDF.
# This is the combined conference PDF (program info + abstracts).
# Path is relative to the year folder.
chronicles:
  file: sources/conference/2023-WSKW-Conference-Program-100423.pdf
  title: "WSKW Chronicles: 2023 WSKW Annual Conference"
