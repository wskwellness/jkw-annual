# ─────────────────────────────────────────────────────────────
# JKW Full Volume — Configuration File
# Copy this file to your year folder as: YYYY/volume_config.yaml
# Then fill in each field for the new volume.
# ─────────────────────────────────────────────────────────────

# ── Volume metadata ──────────────────────────────────────────
year: 2025
volume: 14        # e.g., Vol 14
issue: 1          # e.g., No 1

# ── Cover image ──────────────────────────────────────────────
# Path is relative to the year folder (e.g., 2025/)
cover_image: cover-2025.png   # .pdf or .png (both work)

# ── Output ───────────────────────────────────────────────────
# Name of the final merged PDF (saved inside the year folder)
output_file: JKW_2025_Full_Volume.pdf

# ── Articles ─────────────────────────────────────────────────
# List articles in the order they should appear in the PDF.
# Tip: prefix the PDF files with numbers (01_, 02_, …) so the
# order is visible in the folder, then list them here in that order.
# file is relative to the year folder.

articles:
  - file: sources/manuscripts/01_article.pdf
    title: "Full Article Title As It Should Appear in the TOC"

  - file: sources/manuscripts/02_article.pdf
    title: "Second Article Title"

  - file: sources/manuscripts/03_article.pdf
    title: "Third Article Title"

  # Add more entries as needed…

# ── WSKW Chronicles ──────────────────────────────────────────
# Provide the Chronicles as a pre-built PDF.
# This is the combined conference PDF (program info + abstracts).
# Path is relative to the year folder.
chronicles:
  file: sources/conference/2025_WSKW_Chronicles.pdf
  title: "WSKW Chronicles: 2025 WSKW Annual Conference"
  # Optional: include only selected pages from the conference PDF
  # (1-based, inclusive). Omit both to include the entire file.
  # start_page: 13
  # end_page: 24
